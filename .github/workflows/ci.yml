name: CI / CD

on:
  push:
  pull_request:

jobs:
  # ── Tests & lint ────────────────────────────────────────────────────────────

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run tests
        working-directory: backend
        run: npm test

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: food-frontend/package-lock.json

      - name: Install dependencies
        working-directory: food-frontend
        run: npm ci

      - name: Lint
        working-directory: food-frontend
        run: npm run lint

  # ── Deploy (main branch only) ───────────────────────────────────────────────

  deploy-backend:
    name: Deploy Backend → Cloud Run
    runs-on: ubuntu-latest
    needs: backend-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/798530052896/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-deploy@munchmate-494821.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and push image
        run: |
          docker build \
            -t gcr.io/munchmate-494821/munchmate-backend:${{ github.sha }} \
            -t gcr.io/munchmate-494821/munchmate-backend:latest \
            ./backend
          docker push gcr.io/munchmate-494821/munchmate-backend:${{ github.sha }}
          docker push gcr.io/munchmate-494821/munchmate-backend:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update munchmate-backend \
            --image=gcr.io/munchmate-494821/munchmate-backend:${{ github.sha }} \
            --region=us-central1 \
            --quiet

  deploy-frontend:
    name: Deploy Frontend → Firebase Hosting
    runs-on: ubuntu-latest
    needs: frontend-lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/798530052896/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-deploy@munchmate-494821.iam.gserviceaccount.com

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: food-frontend/package-lock.json

      - name: Install dependencies
        working-directory: food-frontend
        run: npm ci

      - name: Build
        working-directory: food-frontend
        run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        working-directory: food-frontend
        run: firebase deploy --only hosting --project munchmate-494821 --non-interactive
